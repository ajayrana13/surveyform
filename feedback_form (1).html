<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Feedback Form</title>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f5f5;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 2.5rem;
    width: 100%;
    max-width: 520px;
    box-shadow: 0 2px 24px rgba(0,0,0,0.08);
  }
  h1 { font-size: 22px; font-weight: 600; color: #111; margin-bottom: 4px; }
  .sub { font-size: 14px; color: #888; margin-bottom: 2rem; }
  .field { margin-bottom: 1.25rem; }
  label { display: block; font-size: 12px; font-weight: 600; color: #555; margin-bottom: 6px; letter-spacing: 0.04em; text-transform: uppercase; }
  input[type=text], input[type=email], textarea, select {
    width: 100%; font-size: 14px; color: #111;
    background: #fafafa; border: 1px solid #e0e0e0;
    border-radius: 8px; padding: 10px 12px;
    font-family: inherit; outline: none;
    transition: border-color 0.2s;
  }
  input:focus, textarea:focus, select:focus { border-color: #888; background: #fff; }
  textarea { resize: vertical; min-height: 90px; }
  select { height: 40px; cursor: pointer; }
  .star-row { display: flex; gap: 6px; }
  .star-row button {
    background: none; border: none; font-size: 26px;
    cursor: pointer; color: #ddd; padding: 0; line-height: 1;
    transition: color 0.1s;
  }
  .star-row button.active { color: #f59e0b; }
  .radio-group { display: flex; flex-direction: column; gap: 10px; }
  .radio-group label {
    display: flex; align-items: center; gap: 8px;
    font-weight: 400; font-size: 14px; color: #333;
    cursor: pointer; text-transform: none; letter-spacing: 0;
  }
  .radio-group input[type=radio] { margin: 0; width: 16px; height: 16px; cursor: pointer; }
  .btn-submit {
    width: 100%; background: #111; color: #fff;
    border: none; border-radius: 8px;
    font-size: 15px; font-weight: 500;
    padding: 12px; cursor: pointer;
    margin-top: 1.75rem; font-family: inherit;
    transition: background 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-submit:hover { background: #333; }
  .btn-submit:disabled { background: #999; cursor: not-allowed; }
  .toast {
    margin-top: 1rem; padding: 12px 14px;
    border-radius: 8px; font-size: 13px;
    display: none; text-align: center;
  }
  .toast.success { background: #ecfdf5; color: #065f46; border: 1px solid #6ee7b7; }
  .toast.error   { background: #fef2f2; color: #991b1b; border: 1px solid #fca5a5; }
</style>
</head>
<body>
<div class="card">
  <h1>Share your feedback</h1>
  <p class="sub">We'd love to hear from you.</p>

  <div class="field">
    <label>Your name</label>
    <input type="text" id="f-name" placeholder="e.g. Rahul Sharma" />
  </div>
  <div class="field">
    <label>Email address</label>
    <input type="email" id="f-email" placeholder="you@example.com" />
  </div>
  <div class="field">
    <label>Overall rating</label>
    <div class="star-row" id="star-row">
      <button type="button" data-v="1" aria-label="1 star">★</button>
      <button type="button" data-v="2" aria-label="2 stars">★</button>
      <button type="button" data-v="3" aria-label="3 stars">★</button>
      <button type="button" data-v="4" aria-label="4 stars">★</button>
      <button type="button" data-v="5" aria-label="5 stars">★</button>
    </div>
  </div>
  <div class="field">
    <label>How did you hear about us?</label>
    <select id="f-source">
      <option value="">Select an option</option>
      <option>Social media</option>
      <option>Search engine</option>
      <option>Friend / colleague</option>
      <option>Advertisement</option>
      <option>Other</option>
    </select>
  </div>
  <div class="field">
    <label>Would you recommend us?</label>
    <div class="radio-group">
      <label><input type="radio" name="recommend" value="Yes" /> Yes, definitely</label>
      <label><input type="radio" name="recommend" value="Maybe" /> Maybe</label>
      <label><input type="radio" name="recommend" value="No" /> No</label>
    </div>
  </div>
  <div class="field">
    <label>Additional comments</label>
    <textarea id="f-comments" placeholder="Share your thoughts..."></textarea>
  </div>

  <button class="btn-submit" id="submit-btn" onclick="submitForm()">
    &#9993; Send feedback
  </button>
  <div class="toast" id="toast"></div>
</div>

<script>
  emailjs.init('ID1-UOyOdJE8LKmDP');

  let starRating = 0;
  const starBtns = document.querySelectorAll('#star-row button');

  starBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      starRating = parseInt(btn.dataset.v);
      starBtns.forEach(b => b.classList.toggle('active', parseInt(b.dataset.v) <= starRating));
    });
    btn.addEventListener('mouseenter', () => {
      starBtns.forEach(b => b.style.color = parseInt(b.dataset.v) <= parseInt(btn.dataset.v) ? '#f59e0b' : '');
    });
    btn.addEventListener('mouseleave', () => {
      starBtns.forEach(b => b.style.color = '');
    });
  });

  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + type;
    t.style.display = 'block';
    if (type === 'success') setTimeout(() => t.style.display = 'none', 5000);
  }

  function resetForm() {
    document.getElementById('f-name').value = '';
    document.getElementById('f-email').value = '';
    document.getElementById('f-source').value = '';
    document.getElementById('f-comments').value = '';
    document.querySelectorAll('input[name=recommend]').forEach(r => r.checked = false);
    starRating = 0;
    starBtns.forEach(b => b.classList.remove('active'));
  }

  async function submitForm() {
    const name     = document.getElementById('f-name').value.trim();
    const email    = document.getElementById('f-email').value.trim();
    const source   = document.getElementById('f-source').value;
    const recommend = document.querySelector('input[name=recommend]:checked')?.value || 'Not answered';
    const comments = document.getElementById('f-comments').value.trim();

    if (!name || !email) { showToast('Please fill in your name and email.', 'error'); return; }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Sending...';

    const params = {
      name,
      email,
      rating: starRating ? starRating + ' / 5' : 'Not rated',
      source: source || 'Not selected',
      recommend,
      comments: comments || '—',
      timestamp: new Date().toLocaleString('en-IN', { timeZone: 'Asia/Kolkata' })
    };

    try {
      await emailjs.send('service_kyrkajo', 'template_h32sken', params);
      showToast('✓ Feedback sent successfully!', 'success');
      resetForm();
    } catch (err) {
      showToast('Failed: ' + (err.text || err.message || 'unknown error'), 'error');
    } finally {
      btn.disabled = false;
      btn.innerHTML = '&#9993; Send feedback';
    }
  }
</script>
</body>
</html>
